<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>博客后台管理</title>
    <!-- 使用内联配置，显式指定 auth_type 为 pkce -->
    <script type="text/yaml">
      backend:
        name: github
        repo: hu-wentao/hu-wentao.github.io
        branch: main
        auth_type: pkce # 显式指定 PKCE 流程
        client_id: Iv23lidlc79zvEHQy5rn
        site_domain: wyattcoder.top # 明确指定域名，防止 fallback 到 netlify
      
      media_folder: "static/images"
      public_folder: "/images"

      collections:
        - name: "posts"
          label: "文章"
          folder: "content/posts"
          create: true
          slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
          fields:
            - { label: "标题", name: "title", widget: "string" }
            - { label: "日期", name: "date", widget: "datetime" }
            - { label: "正文", name: "body", widget: "markdown" }
    </script>
    <!-- 使用 jsdelivr CDN 避开 unpkg 可能存在的缓存 -->
    <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  </head>
  <body></body>
</html>
