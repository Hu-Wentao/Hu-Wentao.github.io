<script>
  (() => {
    const host = document.body;
    if (document.getElementById("content-width-switch")) return;

    const options = [
      { value: "narrow", label: "窄", name: "窄版" },
      { value: "medium", label: "中", name: "中版" },
      { value: "wide", label: "宽", name: "宽版" },
    ];
    const switcher = document.createElement("div");
    switcher.id = "content-width-switch";
    switcher.className = "content-width-switch";

    const button = document.createElement("button");
    button.type = "button";
    switcher.appendChild(button);

    const applyWidth = (width, persist = true) => {
      const currentIndex = Math.max(0, options.findIndex((option) => option.value === width));
      const current = options[currentIndex];
      const next = options[(currentIndex + 1) % options.length];

      document.documentElement.dataset.contentWidth = width;
      button.textContent = current.label;
      button.dataset.width = current.value;
      button.title = `当前：${current.name}；点击切换到${next.name}`;
      button.setAttribute("aria-label", button.title);

      if (persist) {
        try {
          localStorage.setItem("content-width", width);
        } catch (_) {
          // The selection still works for the current page.
        }
      }
    };

    button.addEventListener("click", () => {
      const currentIndex = options.findIndex((option) => option.value === button.dataset.width);
      const next = options[(currentIndex + 1) % options.length];
      applyWidth(next.value);
    });

    host.appendChild(switcher);
    applyWidth(document.documentElement.dataset.contentWidth || "narrow", false);

    const setTooltip = (element, tooltip) => {
      if (!element) return;
      element.title = tooltip;
      element.setAttribute("aria-label", tooltip);
    };

    setTooltip(document.getElementById("theme-toggle"), "切换明暗主题 (Alt + T)");
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("button.copy-code").forEach((copyButton) => {
        setTooltip(copyButton, "复制代码");
      });
    });
  })();
</script>
