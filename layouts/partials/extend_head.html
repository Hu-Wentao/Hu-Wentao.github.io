{{- $noop := .WordCount -}}
{{- if or (.Page.Store.Get "hasMath") .IsNode }}
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css"
  integrity="sha384-zh0CIslj+VczCZtlzBcjt5ppRcsAmDnRem7ESsYwWwg3m/OaJ2l4x7YBZl9Kxxib"
  crossorigin="anonymous"
>
{{- end }}
<script>
  (() => {
    const widths = ["narrow", "medium", "wide"];
    let width = "narrow";

    try {
      const savedWidth = localStorage.getItem("content-width");
      if (widths.includes(savedWidth)) width = savedWidth;
    } catch (_) {
      // Keep the default when storage is unavailable.
    }

    document.documentElement.dataset.contentWidth = width;
  })();
</script>
