<div class="collaboration-time-simulator">
  <iframe
    src="{{ "tools/vibe-coding-collaboration-time/" | relURL }}"
    title="Vibe Coding 三种协作模式耗时模拟"
    loading="lazy"
    style="display:block;width:100%;height:1500px;border:0;border-radius:12px"
  ></iframe>
  <script>
    (() => {
      const script = document.currentScript;
      const frame = script?.previousElementSibling;
      if (!(frame instanceof HTMLIFrameElement)) return;

      const simulatorOrigin = new URL(frame.src, window.location.href).origin;
      const sendTheme = () => {
        const theme = document.documentElement.dataset.theme || "auto";
        frame.contentWindow?.postMessage(
          { type: "collaboration-time-simulator:theme", theme },
          simulatorOrigin
        );
      };

      window.addEventListener("message", (event) => {
        if (event.origin !== simulatorOrigin || event.source !== frame.contentWindow) return;
        if (event.data?.type !== "collaboration-time-simulator:resize") return;
        const height = Number(event.data.height);
        if (!Number.isFinite(height)) return;
        frame.style.height = `${Math.max(600, Math.min(4000, Math.ceil(height)))}px`;
      });

      frame.addEventListener("load", sendTheme);
      sendTheme();

      const ownerWindow = frame.ownerDocument.defaultView;
      const themeRoot = frame.ownerDocument.documentElement;
      if (ownerWindow && themeRoot) {
        new ownerWindow.MutationObserver(sendTheme).observe(themeRoot, {
          attributes: true,
          attributeFilter: ["data-theme"]
        });
      }
    })();
  </script>
</div>
